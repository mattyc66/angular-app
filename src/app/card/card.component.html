<div class="card">
    <a [routerLink]="'/' + link">
        <div class="card-image" style="width: fit-content; height: fit-content;">
            <figure class="image">
                <img [src]="imageUrl" [alt]="title" class="image" style="width: 400px;height: 300px;">
            </figure>
        </div>
        <div class="card-content">
            <div class="content">
                <h3 style="color: lightgray;">{{ title }}</h3>
                <p style="color: gray;">{{ text }}</p>
            </div>
        </div>   
    </a>
</div>
